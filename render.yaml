services:
  # Auth Service
  - type: web
    name: auth-service
    runtime: docker
    rootDir: services/auth-service
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # Property Service
  - type: web
    name: property-service
    runtime: docker
    rootDir: services/property-service
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Residency Service
  - type: web
    name: residency-service
    runtime: docker
    rootDir: services/residency-service
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Frontend (Static Site)
  - type: web
    name: apartment-frontend
    runtime: docker
    rootDir: apartment-frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: VITE_AUTH_URL
        sync: false
      - key: VITE_PROPERTY_URL
        sync: false
      - key: VITE_RESIDENCY_URL
        sync: false
