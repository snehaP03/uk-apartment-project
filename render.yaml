# Backend services on Render — Frontend deployed on Vercel
services:
  # Auth Service
  - type: web
    name: auth-service
    runtime: node
    rootDir: services/auth-service
    buildCommand: npm ci --omit=dev
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # Property Service
  - type: web
    name: property-service
    runtime: node
    rootDir: services/property-service
    buildCommand: npm ci --omit=dev
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Residency Service
  - type: web
    name: residency-service
    runtime: node
    rootDir: services/residency-service
    buildCommand: npm ci --omit=dev
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
