name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ============================================
  # Test Auth Service
  # ============================================
  test-auth:
    name: Auth Service Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: services/auth-service
        run: npm ci

      - name: Run tests
        working-directory: services/auth-service
        env:
          JWT_SECRET: ci-test-secret
        run: npm test

  # ============================================
  # Test Property Service
  # ============================================
  test-property:
    name: Property Service Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: services/property-service
        run: npm ci

      - name: Run tests
        working-directory: services/property-service
        env:
          JWT_SECRET: ci-test-secret
        run: npm test

  # ============================================
  # Test Residency Service
  # ============================================
  test-residency:
    name: Residency Service Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: services/residency-service
        run: npm ci

      - name: Run tests
        working-directory: services/residency-service
        env:
          JWT_SECRET: ci-test-secret
        run: npm test

  # ============================================
  # Build Frontend
  # ============================================
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apartment-frontend
        run: npm ci

      - name: Lint
        working-directory: apartment-frontend
        run: npm run lint

      - name: Build
        working-directory: apartment-frontend
        run: npm run build

  # ============================================
  # Lighthouse CI — Frontend Quality Metrics
  # ============================================
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: apartment-frontend
        run: npm ci

      - name: Build frontend
        working-directory: apartment-frontend
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.js
          uploadArtifacts: true
